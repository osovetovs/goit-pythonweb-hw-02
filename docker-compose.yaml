services:
  db:
    image: postgres:15
    container_name: hw2_postgres
    restart: always
    environment:
      POSTGRES_DB: hw02
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 567234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: hw2_fastapi
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data: